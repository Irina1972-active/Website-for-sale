<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Teaching Materials</title>
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f9d423 0%, #f83600 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 40px;
            color: white;
            text-shadow: 4px 4px 0 #c53030, 6px 6px 0 rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .product-card {
            background: white;
            border-radius: 30px 30px 20px 20px;
            overflow: hidden;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.3), 0 0 0 2px #fff5e6 inset;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #ffb347;
        }

        .product-card:hover {
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 0 30px 40px -10px #cc4b00, 0 0 0 4px #ffe68f inset;
        }

        /* Блок с названием товара (вместо картинки) */
        .product-title-block {
            width: 100%;
            height: 220px;
            background: linear-gradient(145deg, #ffd966, #ffb347);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: #2d3748;
            text-shadow: 2px 2px 0 #ffe68f;
            padding: 15px;
            border-bottom: 5px solid #ff9f1c;
            word-break: break-word;
            box-shadow: inset 0 -5px 0 #b45f06;
        }

        .product-info {
            padding: 20px 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fff9f0;
            flex: 1;
        }

        .product-description {
            color: #2d3748;
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .product-price {
            font-weight: 800;
            color: #e53e3e;
            font-size: 1.6rem;
            background: #fff1e0;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 40px;
            align-self: flex-start;
            border: 2px solid #ffb347;
            box-shadow: 0 4px 0 #c05600;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .card-btn {
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 6px 0 #b44c00;
            border: 1px solid #ffd27f;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 1 1 auto;
            text-align: center;
            text-decoration: none;
            color: #2d3748;
        }

        .buy-btn {
            background-color: #f6ad55;
        }

        .buy-btn:hover {
            background-color: #ed8936;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #b44c00;
        }

        .buy-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b44c00;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(145deg, #fffbf2, #fff2df);
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 50px 50px 30px 30px;
            overflow-y: auto;
            padding: 30px 30px 40px;
            position: relative;
            box-shadow: 0 30px 50px #b45f06, 0 0 0 6px #ffe49e inset;
            border: 2px solid #ffb703;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 40px;
            font-weight: bold;
            color: #e67e22;
            cursor: pointer;
            transition: 0.2s;
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #b45f06;
            line-height: 1;
        }

        .close-modal:hover {
            color: #d35400;
            transform: scale(1.1);
            background: #fff1d6;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
            border-radius: 40px;
            overflow: hidden;
            border: 5px solid #ffb85b;
            box-shadow: 0 15px 20px #b45f06;
        }

        .carousel-slide {
            width: 100%;
            display: none;
            cursor: pointer;
        }

        .carousel-slide a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .carousel-slide img {
            width: 100%;
            height: 400px;
            object-fit: contain;
            background: #fff7e6;
            padding: 20px;
        }

        .carousel-slide.active {
            display: block;
        }

        .slide-caption {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #b45f06;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 0 0 40px 40px;
            margin-top: -5px;
            border: 2px solid #ffb703;
        }

        .carousel-prev, .carousel-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 165, 0, 0.8);
            color: white;
            border: none;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 28px;
            border-radius: 50%;
            transition: 0.2s;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #b45f06;
            border: 2px solid #ffd966;
            z-index: 10;
        }

        .carousel-prev:hover, .carousel-next:hover {
            background: #ff8c1a;
            transform: translateY(-50%) scale(1.1);
        }

        .carousel-prev {
            left: 15px;
        }

        .carousel-next {
            right: 15px;
        }

        .carousel-dots {
            text-align: center;
            margin-top: 15px;
        }

        .dot {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin: 0 6px;
            background-color: #ffe0b0;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #e67e22;
        }

        .dot.active {
            background-color: #e67e22;
            transform: scale(1.3);
            border-color: #fff;
        }

        .modal-product-title {
            font-size: 2.5rem;
            margin: 10px 0 15px;
            color: #b45f06;
            text-shadow: 2px 2px 0 #ffd27f;
            background: #fff2b5;
            display: inline-block;
            padding: 5px 25px;
            border-radius: 60px;
            border: 3px solid #ffb703;
        }

        .modal-product-description {
            color: #4a2c00;
            line-height: 1.7;
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: rgba(255,255,240,0.7);
            padding: 15px 20px;
            border-radius: 40px;
            border: 1px solid #fbbf77;
        }

        .modal-product-price {
            font-size: 2.2rem;
            font-weight: 800;
            color: #c43e00;
            background: #ffebc0;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 60px;
            margin-bottom: 25px;
            border: 3px solid #ff9800;
            box-shadow: 0 5px 0 #b45f06;
        }

        .contact-info {
            text-align: center;
            background: #fff2cc;
            border-radius: 60px;
            padding: 20px 30px;
            margin-top: 20px;
            border: 3px solid #ff9800;
            box-shadow: 0 5px 0 #b45f06;
        }

        .contact-label {
            font-size: 1.5rem;
            color: #b45f06;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .phone-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #c43e00;
            background: #ffebc0;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 60px;
            border: 2px solid #ffb703;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .carousel-slide img { height: 250px; }
            .modal-content { padding: 20px; }
            .modal-product-title { font-size: 1.8rem; }
            .phone-number { font-size: 1.6rem; }
            .card-actions { flex-direction: column; }
            .product-title-block { font-size: 1.6rem; height: 180px; }
        }
    </style>
</head>
<body>

    <h1>📚 English with Pleasure 🎓</h1>

    <div class="products-grid" id="productsGrid"></div>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <span class="close-modal" id="closeModal">&times;</span>

            <!-- КАРУСЕЛЬ ПЛАТФОРМ -->
            <div class="carousel-container">
                <div id="carouselSlides"></div>
                <button class="carousel-prev" id="carouselPrev">&#10094;</button>
                <button class="carousel-next" id="carouselNext">&#10095;</button>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>

            <h2 class="modal-product-title" id="modalProductTitle"></h2>
            <p class="modal-product-description" id="modalProductDescription"></p>
            <div class="modal-product-price" id="modalProductPrice"></div>

            <div class="contact-info">
                <p class="contact-label">📞 Call me:</p>
                <p class="phone-number" id="modalPhone">+375 29 194 12 51</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== ТОВАРЫ С ДЕМО-ССЫЛКАМИ (ДЛЯ УЧЕБНОГО ПРОЕКТА) ====================
        const products = [
            {
                id: 1,
                title: "📘 Grammar Galaxy",
                shortDescription: "Interactive grammar pack for grades 5-7. Games & quizzes.",
                fullDescription: "A complete set of interactive grammar materials: 50+ worksheets, 200+ task cards, and a board game. Covers tenses, prepositions, articles. Suitable for classroom and online teaching.",
                price: "$10",
                platforms: [
                    {
                        name: "Wordwall",
                        image: "images/Wordwall.png",
                        url: "https://wordwall.net/ru/community/english/grammar" // демо-страница
                    },
                    {
                        name: "ShkolaApp",
                        image: "images/ShkolaApp.png",
                        url: "#" // временная заглушка
                    },
                    {
                        name: "Educaplay",
                        image: "images/Educaplay.png",
                        url: "https://www.educaplay.com/"
                    }
                ]
            },
            {
                id: 2,
                title: "🗣️ Speaking Boosters",
                shortDescription: "120 discussion cards for teenagers. Improve fluency!",
                fullDescription: "Get your students talking with these engaging conversation cards. Topics: school, hobbies, travel, technology, environment. Each card includes vocabulary hints and follow-up questions.",
                price: "$10",
                platforms: [
                    {
                        name: "Взнания",
                        image: "images/Vznaniya.png",
                        url: "https://vznaniya.com/"
                    },
                    {
                        name: "Interacty",
                        image: "images/Interacty.png",
                        url: "https://interacty.me/"
                    }
                ]
            },
            {
                id: 3,
                title: "🎲 Vocabulary Villas",
                shortDescription: "Fun board games and puzzles for learning new words.",
                fullDescription: "A bundle of 10 printable board games, crosswords, and word searches. Perfect for revision days or extra practice. Vocabulary themes: food, animals, professions, sports, and more.",
                price: "$10",
                platforms: [
                    {
                        name: "Superkids",
                        image: "https://logo.clearbit.com/superkids.com", // внешняя ссылка (можно заменить на локальный файл, если скачаете)
                        url: "https://superkid.online/"
                    },
                    {
                        name: "Genially",
                        image: "images/Genially.png",
                        url: "https://genial.ly/"
                    }
                ]
            },
            {
                id: 4,
                title: "📝 Writing Wizard",
                shortDescription: "Step-by-step writing prompts & templates (A2-B1).",
                fullDescription: "Help your students master writing: from sentences to paragraphs. Includes 30 guided writing templates, peer review checklists, and assessment rubrics. Ideal for ESL/EFL learners.",
                price: "$10",
                platforms: [
                    {
                        name: "LearningApps",
                        image: "images/LearningApps.png",
                        url: "https://learningapps.org/"
                    },
                    {
                        name: "Udoba",
                        image: "images/Udoba.png",
                        url: "https://udoba.org/"
                    },
                    {
                        name: "Baamboozle",
                        image: "images/Baamboozle.png",
                        url: "https://www.baamboozle.com/"
                    }
                ]
            }
        ];

        // ==================== ОТРИСОВКА КАРТОЧЕК ====================
        const productsGrid = document.getElementById('productsGrid');

        products.forEach((product, index) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-title-block">${product.title}</div>
                <div class="product-info">
                    <div class="product-description">${product.shortDescription}</div>
                    <div class="product-price">${product.price}</div>
                    <div class="card-actions">
                        <button class="card-btn buy-btn" data-index="${index}">Buy</button>
                    </div>
                </div>
            `;
            productsGrid.appendChild(card);
        });

        // ==================== МОДАЛЬНОЕ ОКНО И КАРУСЕЛЬ ====================
        const modalOverlay = document.getElementById('modalOverlay');
        const closeModal = document.getElementById('closeModal');
        const modalProductTitle = document.getElementById('modalProductTitle');
        const modalProductDescription = document.getElementById('modalProductDescription');
        const modalProductPrice = document.getElementById('modalProductPrice');
        const carouselSlides = document.getElementById('carouselSlides');
        const carouselDots = document.getElementById('carouselDots');
        const carouselPrev = document.getElementById('carouselPrev');
        const carouselNext = document.getElementById('carouselNext');

        let currentProductIndex = 0;
        let currentSlideIndex = 0;
        let platforms = [];

        function openModal(productIndex) {
            const product = products[productIndex];
            if (!product) return;

            currentProductIndex = productIndex;
            modalProductTitle.textContent = product.title;
            modalProductDescription.textContent = product.fullDescription;
            modalProductPrice.textContent = product.price;

            platforms = product.platforms || [];
            currentSlideIndex = 0;
            renderCarousel();

            modalOverlay.style.display = 'flex';
        }

        function closeModalWindow() {
            modalOverlay.style.display = 'none';
        }

        function renderCarousel() {
            carouselSlides.innerHTML = '';
            carouselDots.innerHTML = '';

            if (!platforms.length) {
                carouselSlides.innerHTML = '<div class="carousel-slide active"><img src="https://via.placeholder.com/600x400?text=No+platforms" alt="No platforms"></div>';
                return;
            }

            platforms.forEach((platform, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `carousel-slide ${idx === currentSlideIndex ? 'active' : ''}`;
                slideDiv.innerHTML = `
                    <a href="${platform.url}" target="_blank" rel="noopener">
                        <img src="${platform.image}" alt="${platform.name}" onerror="this.onerror=null; this.src='https://via.placeholder.com/600x400?text=${encodeURIComponent(platform.name)}+Logo';">
                        <div class="slide-caption">${platform.name}</div>
                    </a>
                `;
                carouselSlides.appendChild(slideDiv);
            });

            platforms.forEach((_, idx) => {
                const dot = document.createElement('span');
                dot.className = `dot ${idx === currentSlideIndex ? 'active' : ''}`;
                dot.addEventListener('click', () => {
                    currentSlideIndex = idx;
                    updateCarousel();
                });
                carouselDots.appendChild(dot);
            });
        }

        function updateCarousel() {
            const slides = document.querySelectorAll('.carousel-slide');
            slides.forEach((slide, idx) => {
                slide.classList.toggle('active', idx === currentSlideIndex);
            });

            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === currentSlideIndex);
            });
        }

        carouselPrev.addEventListener('click', (e) => {
            e.stopPropagation();
            if (platforms.length === 0) return;
            currentSlideIndex = (currentSlideIndex - 1 + platforms.length) % platforms.length;
            updateCarousel();
        });

        carouselNext.addEventListener('click', (e) => {
            e.stopPropagation();
            if (platforms.length === 0) return;
            currentSlideIndex = (currentSlideIndex + 1) % platforms.length;
            updateCarousel();
        });

        closeModal.addEventListener('click', closeModalWindow);

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModalWindow();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.style.display === 'flex') {
                closeModalWindow();
            }
        });

        productsGrid.addEventListener('click', (e) => {
            const btn = e.target.closest('.buy-btn');
            if (btn) {
                const index = btn.getAttribute('data-index');
                if (index !== null) openModal(parseInt(index));
            }
        });
    </script>

    <!--
        ==================== ПОЯСНЕНИЕ ДЛЯ ПРЕПОДАВАТЕЛЯ ====================
        Данный сайт создан в рамках учебного проекта. 
        Ссылки в карусели ведут на демонстрационные страницы платформ (главные или разделы),
        чтобы показать работоспособность функционала переходов.
        В будущем они могут быть заменены на реальные ссылки на опубликованные материалы.
        Локальные логотипы находятся в папке /images.
    -->
</body>
</html>
